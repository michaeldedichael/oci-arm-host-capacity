name: Create OCI Instance
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install
      - name: Write private key file
        run: echo "${{ secrets.OCI_KEY_FILE_CONTENT }}" > /tmp/oci_key.pem
      - name: Create .env file
        env:
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
        run: |
          python3 -c "
          import os
          lines = [
            'OCI_USER_ID=\"' + os.environ['OCI_USER_ID'] + '\"',
            'OCI_TENANCY_ID=\"' + os.environ['OCI_TENANCY_ID'] + '\"',
            'OCI_FINGERPRINT=\"' + os.environ['OCI_FINGERPRINT'] + '\"',
            'OCI_REGION=\"' + os.environ['OCI_REGION'] + '\"',
            'OCI_PRIVATE_KEY_FILENAME=\"/tmp/oci_key.pem\"',
            'OCI_SUBNET_ID=\"' + os.environ['OCI_SUBNET_ID'] + '\"',
            'OCI_IMAGE_ID=\"' + os.environ['OCI_IMAGE_ID'] + '\"',
            'OCI_SSH_PUBLIC_KEY=\"' + os.environ['OCI_SSH_PUBLIC_KEY'] + '\"',
            'OCI_OCPUS=' + os.environ['OCI_OCPUS'],
            'OCI_MEMORY_IN_GBS=' + os.environ['OCI_MEMORY_IN_GBS'],
            'OCI_SHAPE=VM.Standard.A1.Flex',
          ]
          open('.env', 'w').write('\n'.join(lines))
          "
      - name: Run instance creation script
        run: php index.php
